<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>berilkln</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      padding: 80px 20px;
      text-align: center;
      background: linear-gradient(135deg, #1e293b, #0f172a);
    }

    h1 {
      font-size: 48px;
      margin: 0;
    }

    p {
      font-size: 18px;
      color: #94a3b8;
      margin-top: 12px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 14px;
      transition: 0.2s ease;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      transform: translateY(-4px);
      background: #273449;
    }

    .card h3 {
      margin: 0 0 10px 0;
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #64748b;
      font-size: 14px;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      background: #334155;
      border-radius: 999px;
      font-size: 12px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>berilkln</h1>
  <p>We build focused mobile apps for learning & productivity</p>
  <div class="badge">iOS • Web</div>
</header>

<div class="container">

  <h2>Our Apps</h2>

  <div class="grid">

    <a class="card" href="apps/halloWort-app.html">
      <h3>Wortify</h3>
      <p>Learn German words with spaced repetition flashcards.</p>
    </a>
  </div>

</div>

<footer>
  © 2026 berilkln • Privacy Policy included in each app
</footer>

</body>
</html>
